<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoring Dashboard | Bhasin Motors</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body data-theme="light">

    <div id="login-wrapper">
      <div class="login-container">
        <div class="login-logo">SCORING DASHBOARD</div>
        <div class="login-subtitle">Multi-Company Performance Tracking</div>
        <div class="login-input-group">
          <label>Phone Number</label>
          <input type="tel" id="loginPhone" placeholder="10-digit phone" maxlength="10">
        </div>
        <div class="login-input-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password">
        </div>
        <button class="login-btn" onclick="performLogin()">Login</button>
        <div class="login-error" id="loginError" style="display:none;"></div>
      </div>
    </div>

    <div id="main-app" style="display:none;">
      <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

      <div class="sidebar" id="sidebar">
        <div class="logo-area">
          <img id="sidebarLogo" src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png" alt="Logo">
        </div>
        <ul class="menu">
          <li onclick="showDashboard()"><i class="fas fa-home"></i> Dashboard</li>
          <li onclick="toggleTheme()"><i class="fas fa-moon"></i> <span id="themeText">Dark Mode</span></li>
          <li onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</li>
        </ul>
      </div>

      <div class="main-content">
        <div class="header-bar">
          <div class="header-left">
            <div class="hamburger" onclick="openSidebar()"><i class="fas fa-bars"></i></div>
            <img id="headerLogo" class="header-logo" src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png" alt="Logo">
          </div>
          <div class="header-center" style="display: flex; align-items: center; gap: 15px;">
            <div class="welcome-text">Welcome, <span id="userNameDisplay">User</span></div>
            <button onclick="logout()" style="background: #ef4444; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600;"><i class="fas fa-sign-out-alt"></i> Logout</button>
          </div>
        </div>

        <div class="content-area">
          <h1 class="page-title">Real-Time Scoring</h1>

          <div class="controls-container">
            <div class="input-group">
              <label class="label-black">DOER NAME</label>
              <input type="text" id="doerSearch" placeholder="Type name...">
            </div>
            <div class="input-group">
              <label class="label-black">START DATE</label>
              <input type="date" id="startDate">
            </div>
            <div class="input-group">
              <label class="label-black">END DATE</label>
              <input type="date" id="endDate">
            </div>
            
            <div class="input-group">
              <label class="label-black">COMPANY / DEPT</label>
              <select id="companySelect">
                <option value="All">All Companies</option>
                <option value="Sales">Sales</option>
                <option value="Service">Service</option>
              </select>
            </div>

            <button class="btn" onclick="loadScores()">Load Scores</button>
          </div>

          <div id="chart_div" style="width: 100%; height: 400px; margin-top: 20px; display: none;"></div>

          <div id="tablesContainer" class="tables-container">
            <div style="text-align:center; padding: 40px; color: var(--text-light);">
              Click <strong>Load Scores</strong> to fetch data from MySQL
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Load Google Charts
      google.charts.load('current', {'packages':['corechart', 'bar']});

      let autoUpdateTimer = null; // Holds the stopwatch for auto-updating

      // INITIALIZE & CHECK MEMORY
      document.addEventListener('DOMContentLoaded', () => {
          // 1. Set dates to today
          const today = new Date().toISOString().split('T')[0];
          document.getElementById('startDate').value = today;
          document.getElementById('endDate').value = today;

          // 2. Check Browser Memory for Login
          const savedUser = localStorage.getItem("doerAdminUser");
          if (savedUser) {
            const userObj = JSON.parse(savedUser);
            document.getElementById('login-wrapper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('userNameDisplay').textContent = userObj.name;
          }
      });

      // LOGIN - PRO UPGRADE WITH MEMORY
      async function performLogin() {
        const phone = document.getElementById('loginPhone').value;
        const password = document.getElementById('loginPassword').value;
        
        const loginBtn = document.querySelector('.login-btn');
        const originalBtnText = loginBtn.innerHTML;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';
        loginBtn.disabled = true; 
        document.getElementById('loginError').style.display = 'none';

        try {
          const response = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ phone, password })
          });

          const result = await response.json();
          
          if (result.success) {
            // SAVE TO BROWSER MEMORY
            localStorage.setItem("doerAdminUser", JSON.stringify(result.user));

            document.getElementById('login-wrapper').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            document.getElementById('userNameDisplay').textContent = result.user.name;
          } else {
            const err = document.getElementById('loginError');
            err.textContent = result.message;
            err.style.display = 'block';
            loginBtn.innerHTML = originalBtnText;
            loginBtn.disabled = false;
          }
        } catch (error) {
          console.error("Login Error:", error);
          const err = document.getElementById('loginError');
          err.textContent = "Network Error. Please try again.";
          err.style.display = 'block';
          loginBtn.innerHTML = originalBtnText;
          loginBtn.disabled = false;
        }
      }

      // LOGOUT FUNCTION
      function logout() {
        localStorage.removeItem("doerAdminUser"); // Erase memory
        location.reload(); // Refresh the page to show the login screen
      }

      // FETCH SCORES FROM MYSQL (With Silent Auto-Update)
      async function loadScores(isSilent = false) {
        const doer = document.getElementById('doerSearch').value;
        const start = document.getElementById('startDate').value;
        const end = document.getElementById('endDate').value;
        const company = document.getElementById('companySelect').value; 

        const container = document.getElementById('tablesContainer');
        
        // Only show the loading spinner if the user physically clicked the button
        if (!isSilent) {
          container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Querying MySQL...</div>';
          document.getElementById('chart_div').style.display = 'none';
        }

        try {
          // Fetch data
          const response = await fetch(`/get_scores?doer=${doer}&start=${start}&end=${end}&company=${company}`);
          const data = await response.json();
          
          renderTable(data);
          
          if (data.length > 0) {
            drawChart(data);
          } else if (isSilent) {
             // If silent update finds no data, hide chart
             document.getElementById('chart_div').style.display = 'none';
          }
        } catch (error) {
          console.error("Auto-Update Error:", error);
        }

        // Start the background timer ONLY when the user manually clicks the button
        if (!isSilent) {
          if (autoUpdateTimer) clearInterval(autoUpdateTimer); // Reset old timers
          autoUpdateTimer = setInterval(() => {
            loadScores(true); // 'true' means do it silently in the background
          }, 10000); // 10000ms = 10 seconds
        }
      }

      function renderTable(data) {
        const container = document.getElementById('tablesContainer');
        if (data.length === 0) {
          container.innerHTML = "No records found for these dates.";
          return;
        }

        let html = `<table>
            <thead>
                <tr>
                    <th>Doer Name</th>
                    <th>Planned Tasks</th>
                    <th>Actual Completed</th>
                    <th>On Time</th>
                    <th>% Work Not Done (KRA 1)</th>
                    <th>% Not On Time (KRA 2)</th>
                </tr>
            </thead>
            <tbody>`;
        
        data.forEach(row => {
          html += `<tr>
            <td><strong>${row.doer_name}</strong></td>
            <td>${row.planned}</td>
            <td>${row.actual}</td>
            <td>${row.on_time}</td>
            <td style="color: ${row.kra1_num < 0 ? '#ef4444' : 'inherit'}">${row.kra1_pct}</td>
            <td style="color: ${row.kra2_num < 0 ? '#ef4444' : 'inherit'}">${row.kra2_pct}</td>
          </tr>`;
        });

        html += '</tbody></table>';
        container.innerHTML = html;
      }

      function drawChart(data) {
        document.getElementById('chart_div').style.display = 'block';

        const chartData = new google.visualization.DataTable();
        chartData.addColumn('string', 'Doer');
        chartData.addColumn('number', 'KRA 1 (% Not Done)');
        chartData.addColumn('number', 'KRA 2 (% Not On Time)');

        data.forEach(row => {
          chartData.addRow([row.doer_name, row.kra1_num, row.kra2_num]); 
        });

        const options = {
          title: 'Doer KRA Performance',
          chartArea: {width: '60%'},
          hAxis: { title: 'Score (%)' },
          vAxis: { title: 'Doer Name' },
          colors: ['#ef4444', '#f59e0b'], 
          bars: 'horizontal' 
        };

        const chart = new google.visualization.BarChart(document.getElementById('chart_div'));
        chart.draw(chartData, options);
      }

      // UI UTILS
      function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('overlay').classList.add('active'); }
      function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('active'); }
      function toggleTheme() {
          const body = document.body;
          const theme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
          body.setAttribute('data-theme', theme);
      }
    </script>
</body>
</html>
